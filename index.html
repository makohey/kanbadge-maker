<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>缶バッチ治具メーカー</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    background: #f3f3f3;
    margin: 0;
    padding: 20px;
  }

  .controls {
    background: white;
    padding: 16px;
    border-radius: 12px;
    margin-bottom: 20px;
    box-shadow: 0 2px 10px rgba(0,0,0,.12);
  }

  label {
    display: inline-block;
    margin: 6px 12px 6px 0;
  }

  input, select, button {
    font-size: 16px;
    padding: 6px;
  }

  .sheet {
    width: 210mm;
    min-height: 297mm;
    background: white;
    margin: auto;
    padding: 10mm;
    box-sizing: border-box;
    display: flex;
    flex-wrap: wrap;
    align-content: flex-start;
    gap: 4mm;
  }

  .badge {
    position: relative;
    border-radius: 50%;
    overflow: hidden;
    background-size: cover;
    background-repeat: no-repeat;
    background-position: center;
    break-inside: avoid;
  }

  .badge::before {
    content: "";
    position: absolute;
    inset: 0;
    border: 0.35mm dashed #000;
    border-radius: 50%;
    box-sizing: border-box;
  }

  .finish-line {
    position: absolute;
    border: 0.35mm solid rgba(255,0,0,.75);
    border-radius: 50%;
    box-sizing: border-box;
    pointer-events: none;
  }

  .safe-line {
    position: absolute;
    border: 0.3mm dashed rgba(0,120,255,.8);
    border-radius: 50%;
    box-sizing: border-box;
    pointer-events: none;
  }

  @media print {
    body {
      background: white;
      padding: 0;
    }

    .controls {
      display: none;
    }

    .sheet {
      margin: 0;
      box-shadow: none;
      width: 210mm;
      min-height: 297mm;
      padding: 10mm;
    }

    @page {
      size: A4;
      margin: 0;
    }
  }
</style>
</head>
<body>

<div class="controls">
  <h2>缶バッチ治具メーカー</h2>

  <label>
    画像：
    <input type="file" id="imageInput" accept="image/*">
  </label>

  <label>
    サイズ：
    <select id="sizeSelect">
      <option value="32">32mm</option>
      <option value="58">58mm</option>
    </select>
  </label>

  <label>
    個数：
    <input type="number" id="countInput" value="12" min="1" max="60">
  </label>

  <br>

  <label>
    拡大：
    <input type="range" id="scaleInput" min="60" max="200" value="100">
  </label>

  <label>
    横位置：
    <input type="range" id="xInput" min="-100" max="100" value="0">
  </label>

  <label>
    縦位置：
    <input type="range" id="yInput" min="-100" max="100" value="0">
  </label>

  <button onclick="window.print()">印刷する</button>

  <p>
    黒の外円＝裁断線 ／ 赤＝仕上がり線 ／ 青＝安全エリア。<br>
    印刷時は「倍率100%」「用紙に合わせるオフ」で印刷。
  </p>
</div>

<div class="sheet" id="sheet"></div>

<script>
const presets = {
  "32": {
    cut: 43,
    finish: 32,
    safe: 28
  },
  "58": {
    cut: 70,
    finish: 58,
    safe: 52
  }
};

let imageURL = "";

const imageInput = document.getElementById("imageInput");
const sizeSelect = document.getElementById("sizeSelect");
const countInput = document.getElementById("countInput");
const scaleInput = document.getElementById("scaleInput");
const xInput = document.getElementById("xInput");
const yInput = document.getElementById("yInput");
const sheet = document.getElementById("sheet");

imageInput.addEventListener("change", e => {
  const file = e.target.files[0];
  if (!file) return;
  imageURL = URL.createObjectURL(file);
  render();
});

[sizeSelect, countInput, scaleInput, xInput, yInput].forEach(el => {
  el.addEventListener("input", render);
});

function render() {
  sheet.innerHTML = "";

  const size = sizeSelect.value;
  const preset = presets[size];
  const count = Number(countInput.value);

  const scale = Number(scaleInput.value);
  const x = Number(xInput.value);
  const y = Number(yInput.value);

  for (let i = 0; i < count; i++) {
    const badge = document.createElement("div");
    badge.className = "badge";

    badge.style.width = preset.cut + "mm";
    badge.style.height = preset.cut + "mm";

    if (imageURL) {
      badge.style.backgroundImage = `url(${imageURL})`;
      badge.style.backgroundSize = `${scale}%`;
      badge.style.backgroundPosition = `${50 + x / 2}% ${50 + y / 2}%`;
    }

    const finish = document.createElement("div");
    finish.className = "finish-line";
    finish.style.width = preset.finish + "mm";
    finish.style.height = preset.finish + "mm";
    finish.style.left = `calc(50% - ${preset.finish / 2}mm)`;
    finish.style.top = `calc(50% - ${preset.finish / 2}mm)`;

    const safe = document.createElement("div");
    safe.className = "safe-line";
    safe.style.width = preset.safe + "mm";
    safe.style.height = preset.safe + "mm";
    safe.style.left = `calc(50% - ${preset.safe / 2}mm)`;
    safe.style.top = `calc(50% - ${preset.safe / 2}mm)`;

    badge.appendChild(finish);
    badge.appendChild(safe);
    sheet.appendChild(badge);
  }
}

render();
</script>

</body>
</html>
